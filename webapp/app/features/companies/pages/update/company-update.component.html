<form [formGroup]="form" class="flex flex-col gap-12 p-4 w-full">

  <div class="mb-2">
    <h2 class="text-2xl font-bold text-white/90/90 flex items-center gap-3">
      <i class="fa-solid fa-building text-blue-600"></i>
      Cadastro de Empresa
    </h2>
  </div>

  <div class="flex flex-wrap gap-4 w-full">

    <div class="flex shadow-xs w-[10rem]">
      <label class="label-input-text px-3 py-2 font-medium text-sm">ID</label>
      <input class="input-text w-full px-2 outline-none disabled:bg-zinc-300 disabled:text-zinc-500" type="text"
             formControlName="id"
             readonly/>
    </div>

    <div class="flex shadow-xs w-full flex-1">
      <label class="label-input-text label-required px-3 py-2 font-medium text-sm">Nome</label>
      <input class="input-text w-full px-2 outline-none" type="text" formControlName="name" required/>
    </div>

  </div>

  <!-- CONTACT SECTION -->
  <details class="w-full group" open>
    <summary
      class="list-none flex text-lg items-center text-gray-500 justify-between p-4 bg-zinc-900 font-medium hover:bg-zinc-900/70 transition-colors cursor-pointer select-none ">
      <div class="flex items-center gap-2">
        <i class="fa-solid fa-address-book"></i>
        <span>Contatos</span>
      </div>
      <i class="fa-solid fa-chevron-down text-gray-400 transition-transform duration-200 group-open:rotate-180"></i>
    </summary>

    <div class="p-5 flex flex-wrap gap-4 w-full">

      <div class="flex shadow-xs  w-[26rem]  ">
        <label class="label-input-text label-required">Telefone</label>
        <input class="input-text" type="tel" formControlName="phone" required/>
      </div>

      <div class="flex shadow-xs w-[26rem]  ">
        <label class="label-input-text label-required">Email</label>
        <input class="input-text" type="email" formControlName="email" required/>
      </div>

    </div>
  </details>

  <!-- ADDRESS SECTION -->
  <details class="w-full group" open>
    <summary
      class="list-none flex text-lg items-center text-gray-500 justify-between p-4 bg-zinc-900 font-medium hover:bg-zinc-900/70 transition-colors cursor-pointer select-none ">
      <div class="flex items-center gap-2">
        <i class="fa-solid fa-map-location-dot"></i>
        <span>Endereço</span>
      </div>
      <i class="fa-solid fa-chevron-down text-gray-400 transition-transform duration-200 group-open:rotate-180"></i>
    </summary>

    <div class="p-5 flex flex-wrap gap-4 w-full">

      <div class="flex shadow-xs w-[25rem]">
        <label class="label-input-text label-required px-3 py-2  font-medium text-sm">Rua</label>
        <input class="input-text w-full px-2 outline-none" type="text" formControlName="street" required/>
      </div>

      <div class="flex shadow-xs w-[10rem]  ">
        <label class="label-input-text label-required px-3 py-2  font-medium text-sm">Número</label>
        <input class="input-text w-full px-2 outline-none" type="text" formControlName="number" required/>
      </div>

      <div class="flex shadow-xs w-[15rem]">
        <label class="label-input-text label-required px-3 py-2  font-medium text-sm">Bairro</label>
        <input class="input-text w-full px-2 outline-none" type="text" formControlName="neighborhood" required/>
      </div>

      <div class="flex shadow-xs   w-[30rem]  ">
        <label class="label-input-text label-required px-3 py-2  font-medium text-sm">Cidade</label>
        <input class="input-text w-full px-2 outline-none" type="text" formControlName="city" required/>
      </div>

      <div class="flex shadow-xs w-[10rem]  ">
        <label class="label-input-text label-required px-3 py-2  font-medium text-sm">UF</label>
        <input class="input-text w-full px-2 outline-none" type="text" formControlName="uf" required/>
      </div>

      <div class="flex shadow-xs   w-[10rem]  ">
        <label class="label-input-text label-required px-3 py-2  font-medium text-sm">CEP</label>
        <input class="input-text w-full px-2 outline-none" type="text" formControlName="zipcode" required/>
      </div>

    </div>
  </details>

  <div class="flex justify-end gap-4 items-center mt-2">
    <button type="submit"
            class="
            border
            hover:bg-red-600/80
            border-red-600/80
            text-red-600/80
            bg-transparent
            font-medium leading-5 rounded-md text-sm px-4 py-2.5 focus:outline-none transition-colors duration-200
            hover:text-white"
            (click)="goToList()">
      <i class="fa-solid fa-cancel"></i>
      Cancelar
    </button>

    <button type="submit"
            class="border
            hover:bg-blue-600/80
            border-blue-600/80
            text-blue-600/80
            bg-transparent
            font-medium leading-5 rounded-md text-sm px-4 py-2.5 focus:outline-none transition-colors duration-200
            hover:text-white"
            (click)="onSave($event)">
      <i class="fa-solid fa-floppy-disk"></i>
      Salvar
    </button>
  </div>

</form>
