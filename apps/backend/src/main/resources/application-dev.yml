server:
  port: 8080
  address: 0.0.0.0

spring:
  main:
    banner-mode: off

  application:
    name: "Ponto Facil"

  datasource:
    url: jdbc:postgresql://localhost:5432/pontofacil
    username: postgres
    password: postgres
    driverClassName: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    enabled: true
    change-log: classpath:/config/liquibase/master.xml

logging:
  level:
    liquibase: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: INFO
